<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Tree Explorer</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-folder-tree"></i> File Tree Explorer</h1>
            <div class="toolbar">
                <div class="location-selector">
                    <i class="fas fa-map-marker-alt"></i>
                    <select id="locationDropdown" class="location-dropdown" title="Change current location">
                        <option value="">Root</option>
                    </select>
                </div>
                <button id="themeToggle" class="theme-toggle" title="Toggle Dark Theme">
                    <i class="fas fa-moon"></i>
                </button>
                <button id="createFolderBtn" class="btn btn-primary">
                    <i class="fas fa-folder-plus"></i> New Folder
                </button>
                <button id="createFileBtn" class="btn btn-success">
                    <i class="fas fa-file-plus"></i> New Document
                </button>
                <button id="refreshBtn" class="btn btn-secondary">
                    <i class="fas fa-sync-alt"></i> Refresh
                </button>
            </div>
        </header>

        <main class="main-content">
            <div class="sidebar">
                <h3>File Tree</h3>
                <div class="search-container">
                    <div class="search-input-wrapper">
                        <i class="fas fa-search search-icon"></i>
                        <input 
                            type="text" 
                            id="searchInput" 
                            class="search-input" 
                            placeholder="Search files and folders..." 
                            autocomplete="off"
                        >
                        <button id="clearSearchBtn" class="clear-search-btn hidden" title="Clear search">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    <div class="search-options">
                        <label class="search-option">
                            <input type="checkbox" id="searchContentCheckbox" class="search-content-checkbox">
                            <span class="checkmark"></span>
                            <span class="search-option-text">Search file content</span>
                            <i class="fas fa-info-circle search-help" title="Include file content in search (slower but more thorough)"></i>
                        </label>
                    </div>
                    <div id="searchStats" class="search-stats hidden"></div>
                </div>
                <div id="fileTree" class="file-tree"></div>
            </div>
            
            <div class="content-area">
                <div id="welcomeMessage" class="welcome">
                    <h2>Welcome to File Tree Explorer</h2>
                    <p>Select a file from the tree to view its content, or create new files and folders using the toolbar.</p>
                </div>
                
                <div id="fileViewer" class="file-viewer hidden">
                    <div class="file-header">
                        <h3 id="fileName"></h3>
                        <div class="file-actions">
                            <button id="editBtn" class="btn btn-outline">
                                <i class="fas fa-edit"></i> Edit
                            </button>
                            <button id="saveBtn" class="btn btn-success hidden">
                                <i class="fas fa-save"></i> Save
                            </button>
                            <button id="cancelBtn" class="btn btn-outline hidden">
                                <i class="fas fa-times"></i> Cancel
                            </button>
                        </div>
                    </div>
                    <div id="markdownToolbar" class="markdown-toolbar hidden">
                        <div class="format-group">
                            <button class="format-btn" data-action="bold" title="Bold (Ctrl+B)">
                                <i class="fas fa-bold"></i>
                            </button>
                            <button class="format-btn" data-action="italic" title="Italic (Ctrl+I)">
                                <i class="fas fa-italic"></i>
                            </button>
                            <button class="format-btn" data-action="strikethrough" title="Strikethrough">
                                <i class="fas fa-strikethrough"></i>
                            </button>
                        </div>
                        <div class="format-group">
                            <button class="format-btn" data-action="h1" title="Header 1">
                                H1
                            </button>
                            <button class="format-btn" data-action="h2" title="Header 2">
                                H2
                            </button>
                            <button class="format-btn" data-action="h3" title="Header 3">
                                H3
                            </button>
                        </div>
                        <div class="format-group">
                            <button class="format-btn" data-action="list" title="Bullet List">
                                <i class="fas fa-list-ul"></i>
                            </button>
                            <button class="format-btn" data-action="orderedList" title="Numbered List">
                                <i class="fas fa-list-ol"></i>
                            </button>
                            <button class="format-btn" data-action="quote" title="Quote">
                                <i class="fas fa-quote-left"></i>
                            </button>
                        </div>
                        <div class="format-group">
                            <button class="format-btn" data-action="link" title="Link">
                                <i class="fas fa-link"></i>
                            </button>
                            <button class="format-btn" data-action="image" title="Image">
                                <i class="fas fa-image"></i>
                            </button>
                            <button class="format-btn" data-action="code" title="Inline Code">
                                <i class="fas fa-code"></i>
                            </button>
                            <button class="format-btn" data-action="codeBlock" title="Code Block">
                                <i class="fas fa-file-code"></i>
                            </button>
                        </div>
                    </div>
                    <div id="fileContent" class="file-content"></div>
                    <textarea id="fileEditor" class="file-editor hidden"></textarea>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal for creating new items -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Create New Item</h3>
                <button id="modalClose" class="close">&times;</button>
            </div>
            <div class="modal-body">
                <label for="itemName">Name:</label>
                <input type="text" id="itemName" placeholder="Enter name...">
                <div id="pathInfo" class="path-info">
                    <label for="modalLocationDropdown"><strong>Location:</strong></label>
                    <div class="modal-location-selector">
                        <i class="fas fa-map-marker-alt"></i>
                        <select id="modalLocationDropdown" class="modal-location-dropdown">
                            <option value="">Root</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button id="modalCancel" class="btn btn-outline">Cancel</button>
                <button id="modalCreate" class="btn btn-primary">Create</button>
            </div>
        </div>
    </div>

    <!-- Notification Modal -->
    <div id="notificationModal" class="modal notification-modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="notificationTitle">Notification</h3>
                <button id="notificationClose" class="close">&times;</button>
            </div>
            <div class="modal-body">
                <div id="notificationIcon" class="notification-icon"></div>
                <div id="notificationMessage">Message</div>
            </div>
            <div class="modal-footer">
                <button id="notificationOk" class="btn btn-primary">OK</button>
            </div>
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div id="confirmationModal" class="modal confirmation-modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="confirmationTitle">Confirm Action</h3>
                <button id="confirmationClose" class="close">&times;</button>
            </div>
            <div class="modal-body">
                <div id="confirmationIcon" class="confirmation-icon">
                    <i class="fas fa-exclamation-triangle"></i>
                </div>
                <div id="confirmationMessage">Are you sure?</div>
            </div>
            <div class="modal-footer">
                <button id="confirmationCancel" class="btn btn-outline">Cancel</button>
                <button id="confirmationConfirm" class="btn btn-danger">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Loading overlay -->
    <div id="loadingOverlay" class="loading-overlay hidden">
        <div class="spinner"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
