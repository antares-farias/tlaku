<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encryption Test Page - File Tree Explorer</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .test-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .lists-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .list-group {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
        }
        
        .list-group h3 {
            margin-bottom: 10px;
            color: var(--primary-color);
        }
        
        .list-input {
            width: 100%;
            min-height: 80px;
            margin-bottom: 10px;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: var(--bg-secondary);
            color: var(--text-color);
            font-family: monospace;
            font-size: 14px;
            resize: vertical;
        }
        
        .char-count {
            font-size: 12px;
            color: var(--text-muted);
            text-align: right;
        }
        
        .test-section {
            margin: 30px 0;
            padding: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }
        
        .test-controls {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 10px 20px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .btn:hover {
            background: var(--primary-hover);
        }
        
        .btn-secondary {
            background: var(--secondary-color);
        }
        
        .btn-secondary:hover {
            background: #5a6268;
        }
        
        .input-text {
            width: 100%;
            min-height: 120px;
            margin: 10px 0;
            padding: 15px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: var(--bg-secondary);
            color: var(--text-color);
            font-family: monospace;
            font-size: 14px;
            resize: vertical;
        }
        
        .result-section {
            margin-top: 15px;
        }
        
        .ratio-info {
            background: var(--bg-secondary);
            padding: 15px;
            border-radius: 4px;
            margin: 15px 0;
            font-family: monospace;
            font-size: 12px;
        }
        
        .seed-input {
            width: 100px;
            padding: 8px;
            margin-left: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: var(--bg-secondary);
            color: var(--text-color);
        }
        
        .error {
            color: #dc3545;
            margin: 10px 0;
            padding: 10px;
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid rgba(220, 53, 69, 0.3);
            border-radius: 4px;
        }
        
        .success {
            color: #28a745;
            margin: 10px 0;
            padding: 10px;
            background: rgba(40, 167, 69, 0.1);
            border: 1px solid rgba(40, 167, 69, 0.3);
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🔐 Encryption Test Page</h1>
            <div class="header-controls">
                <button id="themeToggle" class="btn btn-secondary" title="Toggle Theme">
                    🌙 Dark
                </button>
                <a href="/" class="btn btn-secondary">← Back to Explorer</a>
            </div>
        </header>

        <div class="test-container">
            <div class="lists-grid">
                <div class="list-group">
                    <h3>Latin Character Lists</h3>
                    <div>
                        <label for="latin1">List 1:</label>
                        <textarea id="latin1" class="list-input" placeholder="Enter Latin characters for list 1..."></textarea>
                        <div class="char-count" id="latin1-count">0 characters</div>
                    </div>
                    <div>
                        <label for="latin2">List 2:</label>
                        <textarea id="latin2" class="list-input" placeholder="Enter Latin characters for list 2..."></textarea>
                        <div class="char-count" id="latin2-count">0 characters</div>
                    </div>
                    <div>
                        <label for="latin3">List 3:</label>
                        <textarea id="latin3" class="list-input" placeholder="Enter Latin characters for list 3..."></textarea>
                        <div class="char-count" id="latin3-count">0 characters</div>
                    </div>
                </div>

                <div class="list-group">
                    <h3>Japanese Character Lists</h3>
                    <div>
                        <label for="japanese1">List 1:</label>
                        <textarea id="japanese1" class="list-input" placeholder="Enter Japanese characters for list 1..."></textarea>
                        <div class="char-count" id="japanese1-count">0 characters</div>
                    </div>
                    <div>
                        <label for="japanese2">List 2:</label>
                        <textarea id="japanese2" class="list-input" placeholder="Enter Japanese characters for list 2..."></textarea>
                        <div class="char-count" id="japanese2-count">0 characters</div>
                    </div>
                    <div>
                        <label for="japanese3">List 3:</label>
                        <textarea id="japanese3" class="list-input" placeholder="Enter Japanese characters for list 3..."></textarea>
                        <div class="char-count" id="japanese3-count">0 characters</div>
                    </div>
                </div>
            </div>

            <div class="test-controls">
                <button id="loadCurrentLists" class="btn">📋 Load Current Lists</button>
                <button id="loadFromEnv" class="btn">📄 Load from .env</button>
                <button id="testSample" class="btn btn-secondary">🔤 Test with Sample Text</button>
                <button id="clearAll" class="btn btn-secondary">🗑️ Clear All</button>
            </div>

            <div id="ratioInfo" class="ratio-info" style="display: none;">
                <strong>Current Ratios:</strong><br>
                <span id="ratioDisplay"></span>
            </div>

            <div class="test-section">
                <h3>🔐 Encryption Test</h3>
                <textarea id="inputText" class="input-text" placeholder="Enter text to encrypt...">Hello World! This is a test message with ñiño, café, and résumé.</textarea>
                
                <div class="test-controls">
                    <button id="encryptBtn" class="btn">🔐 Encrypt</button>
                    <label for="seedInput">Seed (optional):</label>
                    <input type="number" id="seedInput" class="seed-input" placeholder="123">
                </div>
                
                <div id="encryptResult" class="result-section" style="display: none;">
                    <h4>Encrypted Result:</h4>
                    <textarea id="encryptedText" class="input-text" readonly></textarea>
                </div>
            </div>

            <div class="test-section">
                <h3>🔓 Decryption Test</h3>
                <textarea id="decryptInput" class="input-text" placeholder="Enter encrypted text to decrypt..."></textarea>
                
                <div class="test-controls">
                    <button id="decryptBtn" class="btn">🔓 Decrypt</button>
                    <button id="useEncrypted" class="btn btn-secondary">📋 Use Above Encrypted</button>
                </div>
                
                <div id="decryptResult" class="result-section" style="display: none;">
                    <h4>Decrypted Result:</h4>
                    <textarea id="decryptedText" class="input-text" readonly></textarea>
                </div>
            </div>

            <div id="errorMessage" class="error" style="display: none;"></div>
            <div id="successMessage" class="success" style="display: none;"></div>
        </div>
    </div>

    <script>
        class EncryptionTester {
            constructor() {
                this.initTheme();
                this.bindEvents();
                this.loadCurrentLists();
            }

            initTheme() {
                const savedTheme = localStorage.getItem('theme') || 'light';
                document.body.setAttribute('data-theme', savedTheme);
                this.updateThemeButton(savedTheme);
            }

            updateThemeButton(theme) {
                const themeToggle = document.getElementById('themeToggle');
                if (theme === 'dark') {
                    themeToggle.innerHTML = '☀️ Light';
                } else {
                    themeToggle.innerHTML = '🌙 Dark';
                }
            }

            toggleTheme() {
                const currentTheme = document.body.getAttribute('data-theme');
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                document.body.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
                this.updateThemeButton(newTheme);
            }

            bindEvents() {
                document.getElementById('themeToggle').addEventListener('click', () => {
                    this.toggleTheme();
                });

                document.getElementById('loadCurrentLists').addEventListener('click', () => {
                    this.loadCurrentLists();
                });

                document.getElementById('loadFromEnv').addEventListener('click', () => {
                    this.loadFromEnv();
                });

                document.getElementById('testSample').addEventListener('click', () => {
                    this.loadSampleText();
                });

                document.getElementById('clearAll').addEventListener('click', () => {
                    this.clearAllInputs();
                });

                document.getElementById('encryptBtn').addEventListener('click', () => {
                    this.encryptText();
                });

                document.getElementById('decryptBtn').addEventListener('click', () => {
                    this.decryptText();
                });

                document.getElementById('useEncrypted').addEventListener('click', () => {
                    this.useEncryptedForDecrypt();
                });

                // Add character count listeners
                ['latin1', 'latin2', 'latin3', 'japanese1', 'japanese2', 'japanese3'].forEach(id => {
                    document.getElementById(id).addEventListener('input', () => {
                        this.updateCharCount(id);
                        this.updateRatios();
                    });
                });
            }

            async loadCurrentLists() {
                try {
                    const response = await fetch('/api/character-lists');
                    const data = await response.json();

                    document.getElementById('latin1').value = data.latin.list1.characters;
                    document.getElementById('latin2').value = data.latin.list2.characters;
                    document.getElementById('latin3').value = data.latin.list3.characters;

                    document.getElementById('japanese1').value = data.japanese.list1.characters;
                    document.getElementById('japanese2').value = data.japanese.list2.characters;
                    document.getElementById('japanese3').value = data.japanese.list3.characters;

                    this.updateAllCharCounts();
                    this.updateRatios();
                    this.showSuccess('Character lists loaded from server');
                } catch (error) {
                    this.showError('Failed to load character lists: ' + error.message);
                }
            }

            async loadFromEnv() {
                try {
                    const response = await fetch('/api/load-env');
                    const data = await response.json();

                    if (response.ok) {
                        document.getElementById('latin1').value = data.latin.list1.characters;
                        document.getElementById('latin2').value = data.latin.list2.characters;
                        document.getElementById('latin3').value = data.latin.list3.characters;

                        document.getElementById('japanese1').value = data.japanese.list1.characters;
                        document.getElementById('japanese2').value = data.japanese.list2.characters;
                        document.getElementById('japanese3').value = data.japanese.list3.characters;

                        this.updateAllCharCounts();
                        this.updateRatios();
                        this.showSuccess('Character lists loaded from .env file');
                    } else {
                        this.showError('Failed to load .env file: ' + data.error);
                    }
                } catch (error) {
                    this.showError('Failed to load .env file: ' + error.message);
                }
            }

            loadSampleText() {
                document.getElementById('inputText').value = 'Hello World! This is a test with ñiño, café, résumé, and UPPERCASE.';
            }

            clearAllInputs() {
                ['latin1', 'latin2', 'latin3', 'japanese1', 'japanese2', 'japanese3'].forEach(id => {
                    document.getElementById(id).value = '';
                });
                document.getElementById('inputText').value = '';
                document.getElementById('decryptInput').value = '';
                document.getElementById('seedInput').value = '';
                this.updateAllCharCounts();
                this.hideResults();
            }

            updateCharCount(id) {
                const textarea = document.getElementById(id);
                const countElement = document.getElementById(id + '-count');
                countElement.textContent = `${textarea.value.length} characters`;
            }

            updateAllCharCounts() {
                ['latin1', 'latin2', 'latin3', 'japanese1', 'japanese2', 'japanese3'].forEach(id => {
                    this.updateCharCount(id);
                });
            }

            updateRatios() {
                const latinCounts = [
                    document.getElementById('latin1').value.length,
                    document.getElementById('latin2').value.length,
                    document.getElementById('latin3').value.length
                ];

                const japaneseCounts = [
                    document.getElementById('japanese1').value.length,
                    document.getElementById('japanese2').value.length,
                    document.getElementById('japanese3').value.length
                ];

                const ratios = latinCounts.map((latin, i) => {
                    return latin > 0 ? (japaneseCounts[i] / latin) : 0;
                });

                const ratioDisplay = document.getElementById('ratioDisplay');
                ratioDisplay.innerHTML = ratios.map((ratio, i) => 
                    `List ${i + 1}: ${ratio.toFixed(2)} (${japaneseCounts[i]}/${latinCounts[i]})`
                ).join('<br>');

                document.getElementById('ratioInfo').style.display = 'block';
            }

            async encryptText() {
                const text = document.getElementById('inputText').value;
                const seed = document.getElementById('seedInput').value;

                if (!text.trim()) {
                    this.showError('Please enter text to encrypt');
                    return;
                }

                try {
                    const response = await fetch('/api/encrypt', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            text: text,
                            seed: seed ? parseInt(seed) : null
                        })
                    });

                    const result = await response.json();

                    if (response.ok) {
                        document.getElementById('encryptedText').value = result.encrypted;
                        document.getElementById('encryptResult').style.display = 'block';
                        this.showSuccess('Text encrypted successfully');
                    } else {
                        this.showError('Encryption failed: ' + result.error);
                    }
                } catch (error) {
                    this.showError('Encryption failed: ' + error.message);
                }
            }

            async decryptText() {
                const text = document.getElementById('decryptInput').value;

                if (!text.trim()) {
                    this.showError('Please enter encrypted text to decrypt');
                    return;
                }

                try {
                    const response = await fetch('/api/decrypt', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            text: text
                        })
                    });

                    const result = await response.json();

                    if (response.ok) {
                        document.getElementById('decryptedText').value = result.decrypted;
                        document.getElementById('decryptResult').style.display = 'block';
                        this.showSuccess('Text decrypted successfully (Note: Decryption is approximate)');
                    } else {
                        this.showError('Decryption failed: ' + result.error);
                    }
                } catch (error) {
                    this.showError('Decryption failed: ' + error.message);
                }
            }

            useEncryptedForDecrypt() {
                const encryptedText = document.getElementById('encryptedText').value;
                if (encryptedText) {
                    document.getElementById('decryptInput').value = encryptedText;
                } else {
                    this.showError('No encrypted text available. Please encrypt some text first.');
                }
            }

            showError(message) {
                const errorElement = document.getElementById('errorMessage');
                errorElement.textContent = message;
                errorElement.style.display = 'block';
                document.getElementById('successMessage').style.display = 'none';
                setTimeout(() => {
                    errorElement.style.display = 'none';
                }, 5000);
            }

            showSuccess(message) {
                const successElement = document.getElementById('successMessage');
                successElement.textContent = message;
                successElement.style.display = 'block';
                document.getElementById('errorMessage').style.display = 'none';
                setTimeout(() => {
                    successElement.style.display = 'none';
                }, 5000);
            }

            hideResults() {
                document.getElementById('encryptResult').style.display = 'none';
                document.getElementById('decryptResult').style.display = 'none';
                document.getElementById('ratioInfo').style.display = 'none';
            }
        }

        // Initialize the encryption tester when page loads
        document.addEventListener('DOMContentLoaded', () => {
            new EncryptionTester();
        });
    </script>
</body>
</html>
